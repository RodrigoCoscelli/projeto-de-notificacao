<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Notifica AME PG</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script src="/js/app.js"></script>
    <script>tailwind.config = window.tailwindConfig;</script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        body { font-family: 'Inter', sans-serif; } h1, h2, h3, .brand-font { font-family: 'Manrope', sans-serif; }
        .bg-login {
            background-color: #001B3D;
            background-image: radial-gradient(circle at top right, #00478D 0%, transparent 40%),
                              radial-gradient(circle at bottom left, #002e5c 0%, transparent 40%);
        }
    </style>
</head>
<body class="bg-login text-on-surface flex items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full bg-surface-container-lowest p-10 rounded-2xl shadow-2xl border border-surface-container">
        
        <div class="text-center mb-8">
            <div class="w-16 h-16 rounded-xl bg-primary-container mx-auto flex items-center justify-center text-white mb-4 shadow-lg">
                <span class="material-symbols-outlined text-3xl">local_hospital</span>
            </div>
            <h1 class="text-3xl font-extrabold text-[#001B3D] brand-font mb-1">AME PG</h1>
            <p class="text-sm font-semibold text-on-surface-variant tracking-wider uppercase">Qualidade e Segurança</p>
        </div>

        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold mb-2 text-[#001B3D]">Usuário</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-3 top-2.5 text-outline">person</span>
                    <input type="text" id="username" class="w-full rounded-xl border-outline-variant pl-10 pr-4 py-2.5 focus:ring-2 focus:ring-primary focus:border-primary transition-all bg-surface-container-low" required placeholder="Digite seu usuário">
                </div>
            </div>
            <div>
                <label class="block text-sm font-semibold mb-2 text-[#001B3D]">Senha</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-3 top-2.5 text-outline">lock</span>
                    <input type="password" id="password" class="w-full rounded-xl border-outline-variant pl-10 pr-4 py-2.5 focus:ring-2 focus:ring-primary focus:border-primary transition-all bg-surface-container-low" required placeholder="••••••••">
                </div>
            </div>
            <button type="submit" class="w-full bg-[#00478D] text-white py-3.5 rounded-xl font-bold mt-2 hover:bg-[#003870] transition-colors shadow-md text-lg flex items-center justify-center gap-2">
                <span>Entrar no Sistema</span>
                <span class="material-symbols-outlined text-sm">arrow_forward</span>
            </button>
        </form>
        
        <div class="mt-8 text-center border-t border-outline-variant/30 pt-6">
            <p class="text-xs text-outline">Sistema de Gestão de Ocorrências © AME PG</p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin text-sm">sync</span> Entrando...';
            btn.disabled = true;

            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const fd = new URLSearchParams();
            fd.append('username', u);
            fd.append('password', p);
            
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: fd
                });
                if(res.ok) {
                    const data = await res.json();
                    localStorage.setItem('token', data.access_token);
                    window.location.href = '/dashboard.html';
                } else {
                    alert("Usuário ou senha inválidos. Verifique as credenciais.");
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            } catch(e) { 
                alert("Erro de conexão com o servidor.");
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
